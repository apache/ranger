services:
  ranger:
    build:
      context: .
      dockerfile: Dockerfile.ranger
      args:
        - RANGER_BASE_IMAGE=${RANGER_BASE_IMAGE}
        - RANGER_BASE_VERSION=${RANGER_BASE_VERSION}
        - RANGER_VERSION=${RANGER_VERSION}
        - RANGER_DB_TYPE=${RANGER_DB_TYPE}
        - KERBEROS_ENABLED=${KERBEROS_ENABLED}
    image: ranger:latest
    container_name: ranger
    hostname: ranger.rangernw
    volumes:
      - ./dist/keytabs/ranger:/etc/keytabs
      - ./dist/version:/home/ranger/dist/version:ro
      - ./scripts/kdc/krb5.conf:/etc/krb5.conf:ro
      - ./scripts/hadoop/core-site.xml:/home/ranger/scripts/core-site.xml:ro
      - ./scripts/admin/ranger-admin-install-${RANGER_DB_TYPE}.properties:/opt/ranger/admin/install.properties
    stdin_open: true
    tty: true
    networks:
      - ranger
    ports:
      - "6080:6080"
    depends_on:
      ranger-kdc:
        condition: service_started
      ranger-zk:
        condition: service_started
      ranger-db:
        condition: service_healthy
    environment:
      - RANGER_VERSION
      - RANGER_DB_TYPE
      - KERBEROS_ENABLED
      - DEBUG_ADMIN=${DEBUG_ADMIN:-false}
      - JAVA_OPTS
    command:
      - /home/ranger/scripts/ranger.sh

  ranger-kdc:
    build:
      context: .
      dockerfile: Dockerfile.ranger-kdc
      args:
        - REALM=${KERBEROS_REALM}
        - KDC_HOST=${KERBEROS_KDC_HOST}
        - MASTER_PASSWORD=${KERBEROS_MASTER_PASSWORD}
        - ADMIN_PRINCIPAL=${KERBEROS_ADMIN_PRINCIPAL}
        - ADMIN_PASSWORD=${KERBEROS_ADMIN_PASSWORD}
    image: ranger-kdc:latest
    container_name: ranger-kdc
    hostname: ranger-kdc.rangernw
    volumes:
      - ./dist/keytabs:/etc/keytabs
    networks:
      - ranger
    ports:
      - "88:88"
      - "88:88/udp"
      - "749:749"

  ranger-db:
    extends:
      service: ${RANGER_DB_TYPE}
      file: docker-compose.ranger-db.yml

  ranger-zk:
    build:
      context: .
      dockerfile: Dockerfile.ranger-zk
      args:
        - RANGER_BASE_IMAGE=${RANGER_BASE_IMAGE}
        - RANGER_BASE_VERSION=${RANGER_BASE_VERSION}
        - ZK_VERSION=${ZK_VERSION}
        - KERBEROS_ENABLED=${KERBEROS_ENABLED}
    image: ranger-zk
    container_name: ranger-zk
    hostname: ranger-zk.rangernw
    depends_on:
      ranger-kdc:
        condition: service_healthy
    volumes:
      - ./dist/keytabs/ranger-zk:/etc/keytabs
      - ./scripts/kdc/krb5.conf:/etc/krb5.conf:ro
      - ./scripts/zk/jaas.conf:/etc/zookeeper/jaas.conf
      - ./scripts/zk/zookeeper-with-kerberos.sh:/zookeeper-with-kerberos.sh:ro
    entrypoint: [ "/bin/bash", "/zookeeper-with-kerberos.sh" ]
    networks:
      - ranger
    ports:
      - "2181:2181"
    environment:
      - KERBEROS_ENABLED

networks:
  ranger:
    name: rangernw
