services:
  # HDFS Dispatcher Service
  ranger-audit-dispatcher-hdfs:
    build:
      context: .
      dockerfile: Dockerfile.ranger-audit-dispatcher
      args:
        - RANGER_BASE_IMAGE=${RANGER_BASE_IMAGE}
        - RANGER_BASE_VERSION=${RANGER_BASE_VERSION}
        - RANGER_VERSION=${RANGER_VERSION}
        - KERBEROS_ENABLED=${KERBEROS_ENABLED}
    image: ranger-audit-dispatcher-hdfs:latest
    container_name: ranger-audit-dispatcher-hdfs
    hostname: ranger-audit-dispatcher-hdfs.rangernw
    command: ["hdfs"]
    stdin_open: true
    tty: true
    depends_on:
      ranger-kdc:
        condition: service_started
      ranger-kafka:
        condition: service_started
      ranger-hadoop:
        condition: service_healthy
    ports:
      - "7092:7090"
    environment:
      JAVA_HOME: /opt/java/openjdk
      AUDIT_DISPATCHER_HOME_DIR: /opt/ranger/audit-dispatcher
      AUDIT_DISPATCHER_CONF_DIR: /opt/ranger/audit-dispatcher/conf
      AUDIT_DISPATCHER_LOG_DIR: /var/log/ranger/audit-dispatcher/hdfs
      AUDIT_DISPATCHER_HEAP: "-Xms512m -Xmx2g"
      RANGER_VERSION: ${RANGER_VERSION}
      KERBEROS_ENABLED: ${KERBEROS_ENABLED}
      KAFKA_BOOTSTRAP_SERVERS: ranger-kafka.rangernw:9092
      HDFS_NAMENODE: ranger-hadoop.rangernw:9000
    networks:
      - ranger
    volumes:
      - ./dist/keytabs/ranger-audit-dispatcher-hdfs:/etc/keytabs
      - ranger-audit-dispatcher-hdfs-logs:/var/log/ranger/audit-dispatcher/hdfs
      - ./scripts/audit-dispatcher/ranger-audit-dispatcher-hdfs-site.xml:/opt/ranger/audit-dispatcher/conf/ranger-audit-dispatcher-hdfs-site.xml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7090/api/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ranger-audit-dispatcher-hdfs-logs:

networks:
  ranger:
    name: rangernw
