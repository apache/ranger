services:
  # Audit Ingestor Service - Receives audits from plugins and produces to Kafka (REFACTORED)
  ranger-audit-ingestor:
    build:
      context: .
      dockerfile: Dockerfile.ranger-audit-ingestor
      args:
        - RANGER_BASE_IMAGE=${RANGER_BASE_IMAGE}
        - RANGER_BASE_VERSION=${RANGER_BASE_VERSION}
        - RANGER_VERSION=${RANGER_VERSION}
        - KERBEROS_ENABLED=${KERBEROS_ENABLED}
    image: ranger-audit-ingestor:latest
    container_name: ranger-audit-ingestor
    hostname: ranger-audit-ingestor.rangernw
    networks:
      ranger:
        aliases:
          - ranger-audit-ingestor.rangernw
    stdin_open: true
    tty: true
    depends_on:
      ranger-kdc:
        condition: service_started
      ranger-kafka:
        condition: service_started
    ports:
      - "7081:7081"
      - "7182:7182"
    environment:
      JAVA_HOME: /opt/java/openjdk
      AUDIT_INGESTOR_HOME_DIR: /opt/ranger/audit-ingestor
      AUDIT_INGESTOR_CONF_DIR: /opt/ranger/audit-ingestor/conf
      AUDIT_INGESTOR_LOG_DIR: /var/log/ranger/audit-ingestor
      AUDIT_INGESTOR_HEAP: "-Xms512m -Xmx2g"
      RANGER_VERSION: ${RANGER_VERSION}
      KERBEROS_ENABLED: ${KERBEROS_ENABLED}
      KAFKA_BOOTSTRAP_SERVERS: ranger-kafka.rangernw:9092
    volumes:
      - ./dist/keytabs/ranger-audit-ingestor:/etc/keytabs
      - ranger-audit-ingestor-logs:/var/log/ranger/audit-ingestor
      - ranger-audit-ingestor-spool:/var/log/ranger/audit-ingestor/audit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7081/api/audit/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ranger-audit-ingestor-logs:
  ranger-audit-ingestor-spool:

networks:
  ranger:
    name: rangernw
